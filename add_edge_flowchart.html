<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>添加图边 - 流程图</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --fg: #172033;
    --line: #64748b;
    --process: #dbeafe;
    --decision: #fef9c3;
    --terminal: #e2e8f0;
    --label: #5b6475;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --line: #94a3b8;
      --process: #1e3a5f;
      --decision: #4a3f1a;
      --terminal: #334155;
      --label: #a3adbd;
    }
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, sans-serif;
  }
  main { max-width: 700px; margin: 32px auto; padding: 0 20px; }
  svg { width: 100%; height: auto; display: block; }
  .edge { stroke: var(--line); stroke-width: 1.5; fill: none; }
  .node-t { fill: var(--terminal); stroke: var(--line); stroke-width: 1.5; }
  .node-p { fill: var(--process); stroke: var(--line); stroke-width: 1.5; }
  .node-d { fill: var(--decision); stroke: var(--line); stroke-width: 1.5; }
  .label-text { fill: var(--label); font-size: 13px; font-weight: 600; }
</style>
<main>
  <svg viewBox="0 0 640 610" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--line)" />
      </marker>
    </defs>

    <!-- === CONNECTORS (all right-angle turns) === -->

    <!-- 1. 开始 → 打印列表 -->
    <path class="edge" marker-end="url(#arrow)" d="M 320 45 L 320 78" />

    <!-- 2. 打印列表 → 输入数据 -->
    <path class="edge" marker-end="url(#arrow)" d="M 320 120 L 320 158" />

    <!-- 3. 输入数据 → 校验（主流程） -->
    <path class="edge" marker-end="url(#arrow)" d="M 320 200 L 320 253" />

    <!-- 4. 校验（不合法）→ 提示输入错误（左拐，直角） -->
    <path class="edge" marker-end="url(#arrow)" d="M 250 280 L 130 280 L 130 328" />
    <text class="label-text" x="190" y="273">不合法</text>

    <!-- 5. 提示输入错误 → 返回输入（左边上拐，直角） -->
    <path class="edge" marker-end="url(#arrow)" d="M 130 368 L 130 128 L 320 128 L 320 158" />

    <!-- 6. 校验（合法）→ 双向赋值（直下） -->
    <path class="edge" marker-end="url(#arrow)" d="M 320 305 L 320 378" />
    <text class="label-text" x="330" y="298">合法</text>

    <!-- 7. 双向赋值 → 是否继续（直下） -->
    <path class="edge" marker-end="url(#arrow)" d="M 320 420 L 320 473" />

    <!-- 8. 是否继续（1=继续）→ 返回输入（右边上拐，直角） -->
    <path class="edge" marker-end="url(#arrow)" d="M 390 500 L 500 500 L 500 128 L 320 128 L 320 158" />
    <text class="label-text" x="400" y="493">1</text>

    <!-- 9. 是否继续（0=结束）→ 结束（直下） -->
    <path class="edge" marker-end="url(#arrow)" d="M 320 528 L 320 563" />
    <text class="label-text" x="330" y="521">0</text>

    <!-- === NODES === -->

    <!-- 开始 -->
    <rect class="node-t" x="280" y="11" width="80" height="34" rx="17" />
    <text x="320" y="32" text-anchor="middle" font-size="14" font-weight="600" fill="var(--fg)">开始</text>

    <!-- 打印全部节点编号与名称列表 -->
    <rect class="node-p" x="215" y="80" width="210" height="40" rx="4" />
    <text x="320" y="104" text-anchor="middle" font-size="13" fill="var(--fg)">打印全部节点编号与名称列表</text>

    <!-- 输入起点、终点编号及路径长度权值 -->
    <rect class="node-p" x="205" y="160" width="230" height="40" rx="4" />
    <text x="320" y="184" text-anchor="middle" font-size="13" fill="var(--fg)">输入起点、终点编号及路径长度权值</text>

    <!-- 校验编号范围与权值是否大于0？ -->
    <polygon class="node-d" points="320,253 390,280 320,307 250,280" />
    <text x="320" y="276" text-anchor="middle" font-size="12" fill="var(--fg)">校验编号范围</text>
    <text x="320" y="291" text-anchor="middle" font-size="12" fill="var(--fg)">与权值是否大于0？</text>

    <!-- 提示输入错误 -->
    <rect class="node-p" x="65" y="330" width="130" height="38" rx="4" />
    <text x="130" y="353" text-anchor="middle" font-size="13" fill="var(--fg)">提示输入错误</text>

    <!-- 双向赋值邻接矩阵并将edgeNum自增1 -->
    <rect class="node-p" x="200" y="380" width="240" height="40" rx="4" />
    <text x="320" y="404" text-anchor="middle" font-size="12" fill="var(--fg)">双向赋值邻接矩阵</text>
    <text x="320" y="415" text-anchor="middle" font-size="12" fill="var(--fg)">并将edgeNum自增1</text>

    <!-- 是否继续添加路径？（1=继续，0=结束） -->
    <polygon class="node-d" points="320,473 390,500 320,527 250,500" />
    <text x="320" y="496" text-anchor="middle" font-size="12" fill="var(--fg)">是否继续添加路径？</text>
    <text x="320" y="511" text-anchor="middle" font-size="12" fill="var(--fg)">（1=继续，0=结束）</text>

    <!-- 结束 -->
    <rect class="node-t" x="280" y="565" width="80" height="34" rx="17" />
    <text x="320" y="586" text-anchor="middle" font-size="14" font-weight="600" fill="var(--fg)">结束</text>
  </svg>
</main>
