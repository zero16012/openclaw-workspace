<svg viewBox="0 0 640 610" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000" />
    </marker>
  </defs>
  <style>
    .ed { stroke:#000000; stroke-width:1.5; fill:none; }
    .t { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .p { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .d { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .lb { fill:#000000; font-size:13px; font-weight:600; }
    .tx { fill:#000000; }
  </style>

  <!-- CONNECTORS -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 45 L 320 78" />
  <path class="ed" marker-end="url(#arrow)" d="M 320 120 L 320 158" />
  <path class="ed" marker-end="url(#arrow)" d="M 320 200 L 320 253" />
  <path class="ed" marker-end="url(#arrow)" d="M 250 280 L 130 280 L 130 328" />
  <text class="lb" x="190" y="273">不合法</text>
  <path class="ed" marker-end="url(#arrow)" d="M 130 368 L 130 128 L 320 128 L 320 158" />
  <path class="ed" marker-end="url(#arrow)" d="M 320 307 L 320 378" />
  <text class="lb" x="330" y="300">合法</text>
  <path class="ed" marker-end="url(#arrow)" d="M 320 420 L 320 473" />
  <path class="ed" marker-end="url(#arrow)" d="M 390 500 L 500 500 L 500 128 L 320 128 L 320 158" />
  <text class="lb" x="400" y="493">1</text>
  <path class="ed" marker-end="url(#arrow)" d="M 320 528 L 320 563" />
  <text class="lb" x="330" y="521">0</text>

  <!-- NODES -->
  <rect class="t" x="280" y="11" width="80" height="34" rx="17" />
  <text x="320" y="32" text-anchor="middle" font-size="14" font-weight="600" class="tx">开始</text>

  <rect class="p" x="215" y="80" width="210" height="40" rx="4" />
  <text x="320" y="104" text-anchor="middle" font-size="13" class="tx">打印全部节点编号与名称列表</text>

  <rect class="p" x="205" y="160" width="230" height="40" rx="4" />
  <text x="320" y="184" text-anchor="middle" font-size="13" class="tx">输入起点、终点编号及路径长度权值</text>

  <polygon class="d" points="320,253 390,280 320,307 250,280" />
  <text x="320" y="276" text-anchor="middle" font-size="12" class="tx">校验编号范围</text>
  <text x="320" y="291" text-anchor="middle" font-size="12" class="tx">与权值是否大于0？</text>

  <rect class="p" x="65" y="330" width="130" height="38" rx="4" />
  <text x="130" y="353" text-anchor="middle" font-size="13" class="tx">提示输入错误</text>

  <rect class="p" x="200" y="380" width="240" height="40" rx="4" />
  <text x="320" y="404" text-anchor="middle" font-size="12" class="tx">双向赋值邻接矩阵</text>
  <text x="320" y="415" text-anchor="middle" font-size="12" class="tx">并将edgeNum自增1</text>

  <polygon class="d" points="320,473 390,500 320,527 250,500" />
  <text x="320" y="496" text-anchor="middle" font-size="12" class="tx">是否继续添加路径？</text>
  <text x="320" y="511" text-anchor="middle" font-size="12" class="tx">（1=继续，0=结束）</text>

  <rect class="t" x="280" y="565" width="80" height="34" rx="17" />
  <text x="320" y="586" text-anchor="middle" font-size="14" font-weight="600" class="tx">结束</text>
</svg>