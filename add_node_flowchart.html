<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>添加新节点/景点 - 流程图</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --fg: #172033;
    --line: #64748b;
    --process: #dbeafe;
    --decision: #fef9c3;
    --terminal: #e2e8f0;
    --label: #5b6475;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --line: #94a3b8;
      --process: #1e3a5f;
      --decision: #4a3f1a;
      --terminal: #334155;
      --label: #a3adbd;
    }
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, sans-serif;
  }
  main { max-width: 700px; margin: 32px auto; padding: 0 20px; }
  svg { width: 100%; height: auto; display: block; }
  .edge { stroke: var(--line); stroke-width: 1.5; fill: none; }
  .node-t { fill: var(--terminal); stroke: var(--line); stroke-width: 1.5; }
  .node-p { fill: var(--process); stroke: var(--line); stroke-width: 1.5; }
  .node-d { fill: var(--decision); stroke: var(--line); stroke-width: 1.5; }
  .label-text { fill: var(--label); font-size: 13px; font-weight: 600; }
</style>
<main>
  <svg viewBox="0 0 640 580" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--line)" />
      </marker>
    </defs>

    <!-- === CONNECTORS (all right-angle turns, drawn before nodes) === -->

    <!-- 1. 开始 → 输入新节点 -->
    <path class="edge" marker-end="url(#arrow)" d="M 320 52 L 320 93" />

    <!-- 2. 输入新节点 → 上限判断 -->
    <path class="edge" marker-end="url(#arrow)" d="M 320 135 L 320 188" />

    <!-- 3. 上限判断(是) → 提示节点已满 -->
    <path class="edge" marker-end="url(#arrow)" d="M 230 220 L 120 220 L 120 293" />
    <text class="label-text" x="175" y="213">是</text>

    <!-- 4. 上限判断(否) → 名称存入nodes -->
    <path class="edge" marker-end="url(#arrow)" d="M 410 220 L 500 220 L 500 293" />
    <text class="label-text" x="455" y="213">否</text>

    <!-- 5. 提示节点已满 → 流程结束 (left to center) -->
    <path class="edge" marker-end="url(#arrow)" d="M 120 335 L 120 478 L 320 478 L 320 510" />

    <!-- 6. 名称存入nodes → 是否继续添加 -->
    <path class="edge" marker-end="url(#arrow)" d="M 500 335 L 500 393" />

    <!-- 7. 是否继续添加(是) → 循环回输入新节点 (loops around left side, all right angles) -->
    <path class="edge" marker-end="url(#arrow)" d="M 440 425 L 200 425 L 200 80 L 320 80 L 320 93" />
    <text class="label-text" x="408" y="418">是</text>

    <!-- 8. 是否继续添加(否) → 流程结束 (right to center) -->
    <path class="edge" marker-end="url(#arrow)" d="M 500 455 L 500 478 L 320 478 L 320 510" />
    <text class="label-text" x="490" y="448">否</text>

    <!-- === NODES === -->

    <!-- 开始 (terminal) -->
    <rect class="node-t" x="280" y="18" width="80" height="34" rx="17" />
    <text x="320" y="39" text-anchor="middle" font-size="14" font-weight="600" fill="var(--fg)">开始</text>

    <!-- 输入新节点/景点名称 (process) -->
    <rect class="node-p" x="235" y="95" width="170" height="40" rx="4" />
    <text x="320" y="119" text-anchor="middle" font-size="13" fill="var(--fg)">输入新节点/景点名称</text>

    <!-- 当前节点总数 = 最大上限 MAX? (diamond) -->
    <polygon class="node-d" points="320,188 410,220 320,252 230,220" />
    <text x="320" y="216" text-anchor="middle" font-size="12" fill="var(--fg)">当前节点总数</text>
    <text x="320" y="231" text-anchor="middle" font-size="12" fill="var(--fg)">= 最大上限 MAX?</text>

    <!-- 提示节点已满 (process) -->
    <rect class="node-p" x="55" y="295" width="130" height="40" rx="4" />
    <text x="120" y="319" text-anchor="middle" font-size="13" fill="var(--fg)">提示节点已满</text>

    <!-- 名称存入nodes数组，更新节点数 (process) -->
    <rect class="node-p" x="400" y="295" width="200" height="40" rx="4" />
    <text x="500" y="319" text-anchor="middle" font-size="13" fill="var(--fg)">名称存入nodes数组，更新节点数</text>

    <!-- 是否继续添加? (diamond) -->
    <polygon class="node-d" points="500,393 560,425 500,457 440,425" />
    <text x="500" y="421" text-anchor="middle" font-size="12" fill="var(--fg)">是否继续添加?</text>

    <!-- 流程结束 (terminal) -->
    <rect class="node-t" x="270" y="512" width="100" height="36" rx="18" />
    <text x="320" y="534" text-anchor="middle" font-size="14" font-weight="600" fill="var(--fg)">流程结束</text>
  </svg>
</main>
