<svg viewBox="0 0 640 580" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000" />
    </marker>
  </defs>
  <style>
    .ed { stroke:#000000; stroke-width:1.5; fill:none; }
    .t { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .p { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .d { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .lb { fill:#000000; font-size:13px; font-weight:600; }
    .tx { fill:#000000; }
  </style>

  <!-- CONNECTORS -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 52 L 320 93" />
  <path class="ed" marker-end="url(#arrow)" d="M 320 135 L 320 188" />
  <path class="ed" marker-end="url(#arrow)" d="M 230 220 L 120 220 L 120 293" />
  <text class="lb" x="175" y="213">是</text>
  <path class="ed" marker-end="url(#arrow)" d="M 410 220 L 500 220 L 500 293" />
  <text class="lb" x="455" y="213">否</text>
  <path class="ed" marker-end="url(#arrow)" d="M 120 335 L 120 478 L 320 478 L 320 510" />
  <path class="ed" marker-end="url(#arrow)" d="M 500 335 L 500 393" />
  <path class="ed" marker-end="url(#arrow)" d="M 440 425 L 200 425 L 200 80 L 320 80 L 320 93" />
  <text class="lb" x="408" y="418">是</text>
  <path class="ed" marker-end="url(#arrow)" d="M 500 455 L 500 478 L 320 478 L 320 510" />
  <text class="lb" x="490" y="448">否</text>

  <!-- NODES -->
  <rect class="t" x="280" y="18" width="80" height="34" rx="17" />
  <text x="320" y="39" text-anchor="middle" font-size="14" font-weight="600" class="tx">开始</text>

  <rect class="p" x="235" y="95" width="170" height="40" rx="4" />
  <text x="320" y="119" text-anchor="middle" font-size="13" class="tx">输入新节点/景点名称</text>

  <polygon class="d" points="320,188 410,220 320,252 230,220" />
  <text x="320" y="216" text-anchor="middle" font-size="12" class="tx">当前节点总数</text>
  <text x="320" y="231" text-anchor="middle" font-size="12" class="tx">= 最大上限 MAX？</text>

  <rect class="p" x="55" y="295" width="130" height="40" rx="4" />
  <text x="120" y="319" text-anchor="middle" font-size="13" class="tx">提示节点已满</text>

  <rect class="p" x="400" y="295" width="200" height="40" rx="4" />
  <text x="500" y="319" text-anchor="middle" font-size="13" class="tx">名称存入nodes数组，更新节点数</text>

  <polygon class="d" points="500,393 560,425 500,457 440,425" />
  <text x="500" y="421" text-anchor="middle" font-size="12" class="tx">是否继续添加？</text>

  <rect class="t" x="270" y="512" width="100" height="36" rx="18" />
  <text x="320" y="534" text-anchor="middle" font-size="14" font-weight="600" class="tx">流程结束</text>
</svg>