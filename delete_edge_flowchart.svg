<svg viewBox="0 0 640 760" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000" />
    </marker>
  </defs>
  <style>
    .ed { stroke:#000000; stroke-width:1.5; fill:none; }
    .t { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .p { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .d { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .lb { fill:#000000; font-size:13px; font-weight:600; }
    .tx { fill:#000000; }
  </style>

  <!-- CONNECTORS (all right-angle turns) -->

  <!-- 1. 开始 → 打印 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 39 L 320 63" />

  <!-- 2. 打印 → 输入 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 105 L 320 133" />

  <!-- 3. 输入 → 校验 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 175 L 320 214" />

  <!-- 4. 校验（非法）→ 提示编号错误 -->
  <path class="ed" marker-end="url(#arrow)" d="M 260 240 L 130 240 L 130 281" />
  <text class="lb" x="195" y="233">非法</text>

  <!-- 5. 提示编号错误 → 返回输入 -->
  <path class="ed" marker-end="url(#arrow)" d="M 130 319 L 130 113 L 320 113 L 320 133" />

  <!-- 6. 校验（合法）→ 判断有效路径 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 266 L 320 336" />
  <text class="lb" x="330" y="259">合法</text>

  <!-- 7. 判断有效路径（无路径）→ 提示路径不存在 -->
  <path class="ed" marker-end="url(#arrow)" d="M 250 360 L 130 360 L 130 411" />
  <text class="lb" x="190" y="353">无路径</text>

  <!-- 8. 提示路径不存在 → 返回输入 -->
  <path class="ed" marker-end="url(#arrow)" d="M 130 449 L 130 113 L 320 113 L 320 133" />

  <!-- 9. 判断有效路径（存在）→ 操作 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 384 L 320 472" />
  <text class="lb" x="330" y="377">存在</text>

  <!-- 10. 操作 → 提示成功 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 512 L 320 543" />

  <!-- 11. 提示成功 → 是否继续 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 581 L 320 616" />

  <!-- 12. 是否继续（1=继续）→ 返回输入 -->
  <path class="ed" marker-end="url(#arrow)" d="M 390 640 L 500 640 L 500 113 L 320 113 L 320 133" />
  <text class="lb" x="400" y="633">1</text>

  <!-- 13. 是否继续（0=结束）→ 结束 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 664 L 320 698" />
  <text class="lb" x="330" y="657">0</text>

  <!-- === NODES === -->

  <!-- 开始 -->
  <rect class="t" x="280" y="5" width="80" height="34" rx="17" />
  <text x="320" y="26" text-anchor="middle" font-size="14" font-weight="600" class="tx">开始</text>

  <!-- 打印全部节点编号与名称列表 -->
  <rect class="p" x="215" y="65" width="210" height="40" rx="4" />
  <text x="320" y="89" text-anchor="middle" font-size="13" class="tx">打印全部节点编号与名称列表</text>

  <!-- 输入路径起点与终点编号 -->
  <rect class="p" x="205" y="135" width="230" height="40" rx="4" />
  <text x="320" y="159" text-anchor="middle" font-size="13" class="tx">输入路径起点与终点编号</text>

  <!-- 校验编号是否合法 -->
  <polygon class="d" points="320,214 380,240 320,266 260,240" />
  <text x="320" y="236" text-anchor="middle" font-size="12" class="tx">校验编号是否合法</text>

  <!-- 提示编号错误 -->
  <rect class="p" x="70" y="281" width="120" height="38" rx="4" />
  <text x="130" y="304" text-anchor="middle" font-size="13" class="tx">提示编号错误</text>

  <!-- 判断两点间是否存在有效路径 -->
  <polygon class="d" points="320,336 390,360 320,384 250,360" />
  <text x="320" y="356" text-anchor="middle" font-size="12" class="tx">判断两点间</text>
  <text x="320" y="371" text-anchor="middle" font-size="12" class="tx">是否存在有效路径</text>

  <!-- 提示路径不存在 -->
  <rect class="p" x="65" y="411" width="130" height="38" rx="4" />
  <text x="130" y="434" text-anchor="middle" font-size="13" class="tx">提示路径不存在</text>

  <!-- 邻接矩阵双向赋值为INF且edgeNum自减1 -->
  <rect class="p" x="195" y="474" width="250" height="38" rx="4" />
  <text x="320" y="495" text-anchor="middle" font-size="12" class="tx">邻接矩阵双向赋值为INF</text>
  <text x="320" y="507" text-anchor="middle" font-size="12" class="tx">且edgeNum自减1</text>

  <!-- 提示路径删除成功 -->
  <rect class="p" x="235" y="543" width="170" height="38" rx="4" />
  <text x="320" y="566" text-anchor="middle" font-size="13" class="tx">提示路径删除成功</text>

  <!-- 是否继续删除路径（继续按1，结束按0） -->
  <polygon class="d" points="320,616 390,640 320,664 250,640" />
  <text x="320" y="636" text-anchor="middle" font-size="12" class="tx">是否继续删除路径？</text>
  <text x="320" y="651" text-anchor="middle" font-size="12" class="tx">（继续按1，结束按0）</text>

  <!-- 结束 -->
  <rect class="t" x="280" y="700" width="80" height="34" rx="17" />
  <text x="320" y="721" text-anchor="middle" font-size="14" font-weight="600" class="tx">结束</text>
</svg>