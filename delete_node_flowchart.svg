<svg viewBox="0 0 640 750" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000" />
    </marker>
  </defs>
  <style>
    .ed { stroke:#000000; stroke-width:1.5; fill:none; }
    .t { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .p { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .d { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .lb { fill:#000000; font-size:13px; font-weight:600; }
    .tx { fill:#000000; }
  </style>

  <!-- CONNECTORS (all right-angle turns) -->

  <!-- 1. 开始 → 打印 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 39 L 320 63" />

  <!-- 2. 打印 → 输入 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 105 L 320 133" />

  <!-- 3. 输入 → 校验 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 175 L 320 216" />

  <!-- 4. 校验（非法）→ 提示错误 -->
  <path class="ed" marker-end="url(#arrow)" d="M 260 240 L 130 240 L 130 289" />
  <text class="lb" x="195" y="233">非法</text>

  <!-- 5. 提示错误 → 返回输入 -->
  <path class="ed" marker-end="url(#arrow)" d="M 130 329 L 130 113 L 320 113 L 320 133" />

  <!-- 6. 校验（合法）→ 确认删除 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 262 L 320 336" />
  <text class="lb" x="330" y="255">合法</text>

  <!-- 7. 确认删除（0=取消）→ 结束 -->
  <path class="ed" marker-end="url(#arrow)" d="M 245 360 L 180 360 L 180 680 L 320 680 L 320 698" />
  <text class="lb" x="212" y="353">0</text>

  <!-- 8. 确认删除（1=确认）→ 操作 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 382 L 320 441" />
  <text class="lb" x="330" y="375">1</text>

  <!-- 9. 操作 → 提示成功 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 497 L 320 519" />

  <!-- 10. 提示成功 → 是否继续 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 559 L 320 606" />

  <!-- 11. 是否继续（1=继续）→ 返回输入 -->
  <path class="ed" marker-end="url(#arrow)" d="M 395 630 L 500 630 L 500 113 L 320 113 L 320 133" />
  <text class="lb" x="405" y="623">1</text>

  <!-- 12. 是否继续（0=结束）→ 结束 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 652 L 320 698" />
  <text class="lb" x="330" y="645">0</text>

  <!-- === NODES === -->

  <!-- 开始 -->
  <rect class="t" x="280" y="5" width="80" height="34" rx="17" />
  <text x="320" y="26" text-anchor="middle" font-size="14" font-weight="600" class="tx">开始</text>

  <!-- 打印全部节点编号与名称列表 -->
  <rect class="p" x="215" y="65" width="210" height="40" rx="4" />
  <text x="320" y="89" text-anchor="middle" font-size="13" class="tx">打印全部节点编号与名称列表</text>

  <!-- 输入待删除节点编号 -->
  <rect class="p" x="220" y="135" width="200" height="40" rx="4" />
  <text x="320" y="159" text-anchor="middle" font-size="13" class="tx">输入待删除节点编号</text>

  <!-- 校验编号合法性 -->
  <polygon class="d" points="320,216 380,240 320,264 260,240" />
  <text x="320" y="236" text-anchor="middle" font-size="12" class="tx">校验编号合法性</text>

  <!-- 提示错误 -->
  <rect class="p" x="80" y="291" width="100" height="38" rx="4" />
  <text x="130" y="314" text-anchor="middle" font-size="13" class="tx">提示错误</text>

  <!-- 是否确认删除？（确认按1，取消按0） -->
  <polygon class="d" points="320,336 395,360 320,384 245,360" />
  <text x="320" y="356" text-anchor="middle" font-size="12" class="tx">是否确认删除？</text>
  <text x="320" y="371" text-anchor="middle" font-size="12" class="tx">（确认按1，取消按0）</text>

  <!-- 节点数组元素前移、重构邻接矩阵、重新统计有效路径数 -->
  <rect class="p" x="200" y="443" width="240" height="54" rx="4" />
  <text x="320" y="460" text-anchor="middle" font-size="12" class="tx">节点数组元素前移</text>
  <text x="320" y="475" text-anchor="middle" font-size="12" class="tx">重构邻接矩阵</text>
  <text x="320" y="490" text-anchor="middle" font-size="12" class="tx">重新统计有效路径数</text>

  <!-- 提示删除成功 -->
  <rect class="p" x="235" y="521" width="170" height="38" rx="4" />
  <text x="320" y="544" text-anchor="middle" font-size="13" class="tx">提示删除成功</text>

  <!-- 是否继续删除节点？（按1继续，按0结束） -->
  <polygon class="d" points="320,606 395,630 320,654 245,630" />
  <text x="320" y="626" text-anchor="middle" font-size="12" class="tx">是否继续删除节点？</text>
  <text x="320" y="641" text-anchor="middle" font-size="12" class="tx">（按1继续，按0结束）</text>

  <!-- 结束 -->
  <rect class="t" x="280" y="700" width="80" height="34" rx="17" />
  <text x="320" y="721" text-anchor="middle" font-size="14" font-weight="600" class="tx">结束</text>
</svg>