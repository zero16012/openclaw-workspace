<svg viewBox="0 0 640 750" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000" />
    </marker>
  </defs>
  <style>
    .ed { stroke:#000000; stroke-width:1.5; fill:none; }
    .t { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .p { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .d { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .lb { fill:#000000; font-size:13px; font-weight:600; }
    .tx { fill:#000000; }
  </style>

  <!-- CONNECTORS (all right-angle turns) -->

  <!-- 1. 开始 → 打印 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 39 L 320 63" />

  <!-- 2. 打印 → 输入 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 105 L 320 133" />

  <!-- 3. 输入 → 校验 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 175 L 320 214" />

  <!-- 4. 校验（非法）→ 提示错误 -->
  <path class="ed" marker-end="url(#arrow)" d="M 260 240 L 130 240 L 130 281" />
  <text class="lb" x="195" y="233">非法</text>

  <!-- 5. 提示错误 → 返回输入 -->
  <path class="ed" marker-end="url(#arrow)" d="M 130 319 L 130 113 L 320 113 L 320 133" />

  <!-- 6. 校验（合法）→ 循环遍历 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 266 L 320 368" />
  <text class="lb" x="330" y="259">合法</text>

  <!-- 7. 循环遍历 → 调用Dijkstra -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 410 L 320 458" />

  <!-- 8. 调用Dijkstra → 是否检索完毕 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 500 L 320 546" />

  <!-- 9. 是否检索完毕（未完成）→ 返回循环遍历 -->
  <path class="ed" marker-end="url(#arrow)" d="M 250 570 L 180 570 L 180 368 L 320 368" />
  <text class="lb" x="215" y="563">未完成</text>

  <!-- 10. 是否检索完毕（检索完毕）→ 结束 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 594 L 320 683" />
  <text class="lb" x="330" y="587">检索完毕</text>

  <!-- === NODES === -->

  <!-- 开始 -->
  <rect class="t" x="280" y="5" width="80" height="34" rx="17" />
  <text x="320" y="26" text-anchor="middle" font-size="14" font-weight="600" class="tx">开始</text>

  <!-- 打印全部节点编号与名称列表 -->
  <rect class="p" x="215" y="65" width="210" height="40" rx="4" />
  <text x="320" y="89" text-anchor="middle" font-size="13" class="tx">打印全部节点编号与名称列表</text>

  <!-- 输入统一起点编号 -->
  <rect class="p" x="220" y="135" width="200" height="40" rx="4" />
  <text x="320" y="159" text-anchor="middle" font-size="13" class="tx">输入统一起点编号</text>

  <!-- 校验编号是否合法 -->
  <polygon class="d" points="320,214 380,240 320,266 260,240" />
  <text x="320" y="236" text-anchor="middle" font-size="12" class="tx">校验编号是否合法</text>

  <!-- 提示错误 -->
  <rect class="p" x="80" y="281" width="100" height="38" rx="4" />
  <text x="130" y="304" text-anchor="middle" font-size="13" class="tx">提示错误</text>

  <!-- 循环遍历其他有效节点 -->
  <rect class="p" x="220" y="370" width="200" height="40" rx="4" />
  <text x="320" y="394" text-anchor="middle" font-size="12" class="tx">循环遍历其他有效节点</text>

  <!-- 调用Dijkstra算法输出当前节点最短路径 -->
  <rect class="p" x="197" y="460" width="246" height="40" rx="4" />
  <text x="320" y="484" text-anchor="middle" font-size="12" class="tx">调用Dijkstra算法输出当前节点最短路径</text>

  <!-- 判断所有节点是否检索完毕？ -->
  <polygon class="d" points="320,546 390,570 320,594 250,570" />
  <text x="320" y="566" text-anchor="middle" font-size="12" class="tx">判断所有节点</text>
  <text x="320" y="581" text-anchor="middle" font-size="12" class="tx">是否检索完毕？</text>

  <!-- 结束 -->
  <rect class="t" x="280" y="685" width="80" height="34" rx="17" />
  <text x="320" y="706" text-anchor="middle" font-size="14" font-weight="600" class="tx">结束</text>
</svg>