<svg viewBox="0 0 640 720" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000" />
    </marker>
  </defs>
  <style>
    .ed { stroke:#000000; stroke-width:1.5; fill:none; }
    .t { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .p { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .d { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .lb { fill:#000000; font-size:13px; font-weight:600; }
    .tx { fill:#000000; }
  </style>

  <!-- CONNECTORS (all right-angle turns) -->

  <!-- 1. 开始 → 打印 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 39 L 320 63" />

  <!-- 2. 打印 → 输入 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 105 L 320 133" />

  <!-- 3. 输入 → 校验（主流程） -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 175 L 320 216" />

  <!-- 4. 校验（非法）→ 提示错误 -->
  <path class="ed" marker-end="url(#arrow)" d="M 260 240 L 130 240 L 130 289" />
  <text class="lb" x="195" y="233">非法</text>

  <!-- 5. 提示错误 → 返回输入 -->
  <path class="ed" marker-end="url(#arrow)" d="M 130 329 L 130 113 L 320 113 L 320 133" />

  <!-- 6. 校验（合法）→ 调用Dijkstra -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 262 L 320 323" />
  <text class="lb" x="330" y="255">合法</text>

  <!-- 7. 调用Dijkstra → INF判断 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 365 L 320 406" />

  <!-- 8. INF判断（是）→ 两点无法连通 -->
  <path class="ed" marker-end="url(#arrow)" d="M 250 430 L 140 430 L 140 489" />
  <text class="lb" x="195" y="423">是</text>

  <!-- 9. INF判断（否）→ 最短路径 -->
  <path class="ed" marker-end="url(#arrow)" d="M 390 430 L 500 430 L 500 489" />
  <text class="lb" x="445" y="423">否</text>

  <!-- 10. 两点无法连通 → 汇聚 -->
  <path class="ed" marker-end="url(#arrow)" d="M 140 529 L 140 575 L 320 575 L 320 596" />

  <!-- 11. 最短路径 → 汇聚 -->
  <path class="ed" marker-end="url(#arrow)" d="M 500 529 L 500 575 L 320 575 L 320 596" />

  <!-- 12. 是否继续（1=继续）→ 返回输入 -->
  <path class="ed" marker-end="url(#arrow)" d="M 390 620 L 500 620 L 500 113 L 320 113 L 320 133" />
  <text class="lb" x="400" y="613">1</text>

  <!-- 13. 是否继续（0=结束）→ 结束 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 642 L 320 663" />
  <text class="lb" x="330" y="635">0</text>

  <!-- === NODES === -->

  <!-- 开始 -->
  <rect class="t" x="280" y="5" width="80" height="34" rx="17" />
  <text x="320" y="26" text-anchor="middle" font-size="14" font-weight="600" class="tx">开始</text>

  <!-- 打印全部节点编号与名称列表 -->
  <rect class="p" x="215" y="65" width="210" height="40" rx="4" />
  <text x="320" y="89" text-anchor="middle" font-size="13" class="tx">打印全部节点编号与名称列表</text>

  <!-- 输入起点和终点编号 -->
  <rect class="p" x="220" y="135" width="200" height="40" rx="4" />
  <text x="320" y="159" text-anchor="middle" font-size="13" class="tx">输入起点和终点编号</text>

  <!-- 校验编号有效性 -->
  <polygon class="d" points="320,216 380,240 320,264 260,240" />
  <text x="320" y="236" text-anchor="middle" font-size="12" class="tx">校验编号有效性</text>

  <!-- 提示错误 -->
  <rect class="p" x="80" y="291" width="100" height="38" rx="4" />
  <text x="130" y="314" text-anchor="middle" font-size="13" class="tx">提示错误</text>

  <!-- 调用Dijkstra算法计算 -->
  <rect class="p" x="220" y="325" width="200" height="40" rx="4" />
  <text x="320" y="349" text-anchor="middle" font-size="13" class="tx">调用Dijkstra算法计算</text>

  <!-- 判断终点距离是否为无穷大INF？ -->
  <polygon class="d" points="320,406 390,430 320,454 250,430" />
  <text x="320" y="426" text-anchor="middle" font-size="12" class="tx">判断终点距离</text>
  <text x="320" y="441" text-anchor="middle" font-size="12" class="tx">是否为无穷大INF？</text>

  <!-- 输出"两点无法连通" -->
  <rect class="p" x="60" y="491" width="160" height="38" rx="4" />
  <text x="140" y="514" text-anchor="middle" font-size="13" class="tx">输出"两点无法连通"</text>

  <!-- 输出最短路径长度及途经节点 -->
  <rect class="p" x="395" y="491" width="210" height="38" rx="4" />
  <text x="500" y="514" text-anchor="middle" font-size="13" class="tx">输出最短路径长度及途经节点</text>

  <!-- 是否继续查询 -->
  <polygon class="d" points="320,596 390,620 320,644 250,620" />
  <text x="320" y="616" text-anchor="middle" font-size="12" class="tx">是否继续查询</text>
  <text x="320" y="631" text-anchor="middle" font-size="12" class="tx">（按1继续，按0结束）</text>

  <!-- 结束 -->
  <rect class="t" x="280" y="665" width="80" height="34" rx="17" />
  <text x="320" y="686" text-anchor="middle" font-size="14" font-weight="600" class="tx">结束</text>
</svg>