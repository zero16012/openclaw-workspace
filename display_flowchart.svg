<svg viewBox="0 0 660 610" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000" />
    </marker>
  </defs>
  <style>
    .ed { stroke:#000000; stroke-width:1.5; fill:none; }
    .t { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .p { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .d { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .lb { fill:#000000; font-size:13px; font-weight:600; }
    .tx { fill:#000000; }
  </style>

  <!-- CONNECTORS (all right-angle turns) -->

  <!-- 1. 开始 → 输入 -->
  <path class="ed" marker-end="url(#arrow)" d="M 330 42 L 330 67" />

  <!-- 2. 输入 → 选择展示类型 -->
  <path class="ed" marker-end="url(#arrow)" d="M 330 141 L 330 166" />

  <!-- 3. 选择展示类型(1) → 左支 -->
  <path class="ed" marker-end="url(#arrow)" d="M 260 190 L 155 190 L 155 258" />
  <text class="lb" x="208" y="183">1</text>

  <!-- 4. 左支上 → 左支下 -->
  <path class="ed" marker-end="url(#arrow)" d="M 155 300 L 155 348" />

  <!-- 5. 选择展示类型(2) → 中支 -->
  <path class="ed" marker-end="url(#arrow)" d="M 330 212 L 330 258" />
  <text class="lb" x="340" y="205">2</text>

  <!-- 6. 中支上 → 中支下 -->
  <path class="ed" marker-end="url(#arrow)" d="M 330 300 L 330 348" />

  <!-- 7. 选择展示类型(3) → 右支 -->
  <path class="ed" marker-end="url(#arrow)" d="M 400 190 L 505 190 L 505 258" />
  <text class="lb" x="453" y="183">3</text>

  <!-- 8. 右支上 → 右支下 -->
  <path class="ed" marker-end="url(#arrow)" d="M 505 300 L 505 348" />

  <!-- 9. 左支下 → 汇聚 -->
  <path class="ed" marker-end="url(#arrow)" d="M 155 390 L 155 440 L 330 440 L 330 458" />

  <!-- 10. 中支下 → 汇聚 -->
  <path class="ed" marker-end="url(#arrow)" d="M 330 390 L 330 458" />

  <!-- 11. 右支下 → 汇聚 -->
  <path class="ed" marker-end="url(#arrow)" d="M 505 390 L 505 440 L 330 440 L 330 458" />

  <!-- 12. 汇聚 → 结束 -->
  <path class="ed" marker-end="url(#arrow)" d="M 330 500 L 330 541" />

  <!-- === NODES === -->

  <!-- 开始 -->
  <rect class="t" x="290" y="8" width="80" height="34" rx="17" />
  <text x="330" y="29" text-anchor="middle" font-size="14" font-weight="600" class="tx">开始</text>

  <!-- 输入展示类型 -->
  <rect class="p" x="190" y="69" width="280" height="72" rx="4" />
  <text x="330" y="90" text-anchor="middle" font-size="13" class="tx">输入展示类型</text>
  <text x="330" y="106" text-anchor="middle" font-size="11" class="tx">1=查看全部节点  2=查看邻接矩阵</text>
  <text x="330" y="120" text-anchor="middle" font-size="11" class="tx">3=控制台图形化地图</text>

  <!-- 选择展示类型 -->
  <polygon class="d" points="330,166 400,190 330,214 260,190" />
  <text x="330" y="186" text-anchor="middle" font-size="13" class="tx">选择展示类型</text>

  <!-- 左支：单层循环遍历nodes数组 -->
  <rect class="p" x="60" y="260" width="190" height="40" rx="4" />
  <text x="155" y="284" text-anchor="middle" font-size="12" class="tx">单层循环遍历nodes数组</text>

  <!-- 左支：输出所有节点编号与名称 -->
  <rect class="p" x="60" y="350" width="190" height="40" rx="4" />
  <text x="155" y="374" text-anchor="middle" font-size="12" class="tx">输出所有节点编号与名称</text>

  <!-- 中支：双层循环遍历邻接矩阵 -->
  <rect class="p" x="235" y="260" width="190" height="40" rx="4" />
  <text x="330" y="284" text-anchor="middle" font-size="12" class="tx">双层循环遍历邻接矩阵</text>

  <!-- 中支：格式化输出权值与INF标记 -->
  <rect class="p" x="235" y="350" width="190" height="40" rx="4" />
  <text x="330" y="374" text-anchor="middle" font-size="12" class="tx">格式化输出权值与INF标记</text>

  <!-- 右支：双层循环遍历邻接矩阵 -->
  <rect class="p" x="410" y="260" width="190" height="40" rx="4" />
  <text x="505" y="284" text-anchor="middle" font-size="12" class="tx">双层循环遍历邻接矩阵</text>

  <!-- 右支：输出节点连通关系与路径长度 -->
  <rect class="p" x="410" y="350" width="190" height="40" rx="4" />
  <text x="505" y="374" text-anchor="middle" font-size="12" class="tx">输出节点连通关系与路径长度</text>

  <!-- 全部数据检索输出完毕 -->
  <rect class="p" x="230" y="460" width="200" height="40" rx="4" />
  <text x="330" y="484" text-anchor="middle" font-size="13" class="tx">全部数据检索输出完毕</text>

  <!-- 结束 -->
  <rect class="t" x="290" y="543" width="80" height="34" rx="17" />
  <text x="330" y="564" text-anchor="middle" font-size="14" font-weight="600" class="tx">结束</text>
</svg>