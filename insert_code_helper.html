<html><body>
<script>
// Wait for page to load, then set editor content
function insertCode() {
    // Try various ways to find and set the Monaco editor
    var ta = document.querySelector('.inputarea.monaco-mouse-cursor-text');
    if (!ta) { setTimeout(insertCode, 1000); return; }
    
    // Try to access editor model
    var editorEl = ta.closest('.monaco-editor');
    if (editorEl) {
        // Monaco stores editor model, try accessing it
        // Can also try using the global monaco object
        if (window.monaco && window.monaco.editor) {
            var models = window.monaco.editor.getModels();
            if (models && models.length > 0) {
                models[0].setValue(document.getElementById('code').value);
                return;
            }
        }
    }
    
    // Fallback: use textarea + execCommand
    ta.focus();
    ta.select();
    document.execCommand('delete');
    
    // Insert in chunks to avoid issues
    var code = document.getElementById('code').value;
    document.execCommand('insertText', false, code);
}
window.addEventListener('load', insertCode);
</script>
<textarea id="code" style="width:100%;height:800px;"></textarea>
</body></html>
