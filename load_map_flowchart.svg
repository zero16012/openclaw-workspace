<svg viewBox="0 0 560 690" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000" />
    </marker>
  </defs>
  <style>
    .ed { stroke:#000000; stroke-width:1.5; fill:none; }
    .t { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .p { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .d { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .lb { fill:#000000; font-size:13px; font-weight:600; }
    .tx { fill:#000000; }
  </style>

  <!-- CONNECTORS (all right-angle turns) -->

  <!-- 1. 开始 → 打开文件 -->
  <path class="ed" marker-end="url(#arrow)" d="M 280 42 L 280 78" />

  <!-- 2. 打开文件 → 判断 -->
  <path class="ed" marker-end="url(#arrow)" d="M 280 120 L 280 173" />

  <!-- 3. 判断（不存在）→ 提示无文件 -->
  <path class="ed" marker-end="url(#arrow)" d="M 220 195 L 130 195 L 130 259" />
  <text class="lb" x="175" y="188">不存在</text>

  <!-- 4. 提示无文件 → 结束（左路下拐再右拐汇聚） -->
  <path class="ed" marker-end="url(#arrow)" d="M 130 299 L 130 600 L 280 600 L 280 631" />

  <!-- 5. 判断（存在）→ 读取 -->
  <path class="ed" marker-end="url(#arrow)" d="M 280 217 L 280 331" />
  <text class="lb" x="290" y="210">存在</text>

  <!-- 6. 读取 → 统计 -->
  <path class="ed" marker-end="url(#arrow)" d="M 280 387 L 280 438" />

  <!-- 7. 统计 → 提示成功 -->
  <path class="ed" marker-end="url(#arrow)" d="M 280 480 L 280 519" />

  <!-- 8. 提示成功 → 结束 -->
  <path class="ed" marker-end="url(#arrow)" d="M 280 559 L 280 631" />

  <!-- === NODES === -->

  <!-- 开始 -->
  <rect class="t" x="240" y="8" width="80" height="34" rx="17" />
  <text x="280" y="29" text-anchor="middle" font-size="14" font-weight="600" class="tx">开始</text>

  <!-- 以读方式打开campus_map.txt -->
  <rect class="p" x="170" y="80" width="220" height="40" rx="4" />
  <text x="280" y="104" text-anchor="middle" font-size="13" class="tx">以读方式打开campus_map.txt</text>

  <!-- 判断文件是否存在？ -->
  <polygon class="d" points="280,173 340,195 280,217 220,195" />
  <text x="280" y="191" text-anchor="middle" font-size="12" class="tx">判断文件</text>
  <text x="280" y="206" text-anchor="middle" font-size="12" class="tx">是否存在？</text>

  <!-- 提示无地图文件 -->
  <rect class="p" x="55" y="261" width="150" height="38" rx="4" />
  <text x="130" y="284" text-anchor="middle" font-size="13" class="tx">提示无地图文件</text>

  <!-- 读取节点总数、节点名称和邻接矩阵并覆盖内存全局变量 -->
  <rect class="p" x="155" y="333" width="250" height="54" rx="4" />
  <text x="280" y="357" text-anchor="middle" font-size="12" class="tx">读取节点总数、节点名称</text>
  <text x="280" y="373" text-anchor="middle" font-size="12" class="tx">和邻接矩阵并覆盖内存全局变量</text>

  <!-- 重新遍历矩阵统计有效路径数edgeNum -->
  <rect class="p" x="160" y="440" width="240" height="40" rx="4" />
  <text x="280" y="464" text-anchor="middle" font-size="12" class="tx">重新遍历矩阵统计有效路径数edgeNum</text>

  <!-- 提示地图加载成功 -->
  <rect class="p" x="195" y="521" width="170" height="38" rx="4" />
  <text x="280" y="544" text-anchor="middle" font-size="13" class="tx">提示地图加载成功</text>

  <!-- 结束 -->
  <rect class="t" x="240" y="633" width="80" height="34" rx="17" />
  <text x="280" y="654" text-anchor="middle" font-size="14" font-weight="600" class="tx">结束</text>
</svg>