<svg viewBox="0 0 960 650" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000" />
    </marker>
  </defs>
  <style>
    .ed { stroke:#000000; stroke-width:1.5; fill:none; }
    .t { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .p { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .d { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .lb { fill:#000000; font-size:13px; font-weight:600; }
    .tx { fill:#000000; font-size:13px; text-anchor:middle; }
  </style>

  <!-- MAIN FLOW -->
  <path class="ed" marker-end="url(#arrow)" d="M 480 39 L 480 68" />
  <path class="ed" marker-end="url(#arrow)" d="M 480 106 L 480 143" />
  <path class="ed" marker-end="url(#arrow)" d="M 480 181 L 480 233" />

  <!-- 否 → 提示错误 -->
  <path class="ed" marker-end="url(#arrow)" d="M 390 260 L 300 260 L 300 330" />
  <text class="lb" x="345" y="253">否</text>

  <!-- 提示错误 → 返回输入 -->
  <path class="ed" marker-end="url(#arrow)" d="M 300 368 L 300 162 L 380 162" />

  <!-- 是 → 分支主横线 -->
  <path class="ed" marker-end="url(#arrow)" d="M 480 287 L 480 320" />
  <text class="lb" x="490" y="280">是</text>

  <!-- 选项横线 -->
  <path class="ed" d="M 142 340 L 878 340" />

  <!-- 8条竖线进功能框 -->
  <path class="ed" marker-end="url(#arrow)" d="M 164 340 L 164 398" />
  <path class="ed" marker-end="url(#arrow)" d="M 266 340 L 266 398" />
  <path class="ed" marker-end="url(#arrow)" d="M 367 340 L 367 398" />
  <path class="ed" marker-end="url(#arrow)" d="M 469 340 L 469 398" />
  <path class="ed" marker-end="url(#arrow)" d="M 571 340 L 571 398" />
  <path class="ed" marker-end="url(#arrow)" d="M 673 340 L 673 398" />
  <path class="ed" marker-end="url(#arrow)" d="M 775 340 L 775 398" />
  <path class="ed" marker-end="url(#arrow)" d="M 856 340 L 856 398" />

  <!-- 编号 -->
  <text x="164" y="334" class="lb" font-size="12">1</text>
  <text x="266" y="334" class="lb" font-size="12">2</text>
  <text x="367" y="334" class="lb" font-size="12">3</text>
  <text x="469" y="334" class="lb" font-size="12">4</text>
  <text x="571" y="334" class="lb" font-size="12">5</text>
  <text x="673" y="334" class="lb" font-size="12">6</text>
  <text x="775" y="334" class="lb" font-size="12">7</text>
  <text x="856" y="334" class="lb" font-size="12">8</text>

  <!-- 功能汇聚横线 -->
  <path class="ed" d="M 164 446 L 856 446" />

  <!-- 1-7 回收菜单 -->
  <path class="ed" marker-end="url(#arrow)" d="M 164 446 L 140 446 L 140 74 L 375 74" />

  <!-- 8 退出 → 结束 -->
  <path class="ed" marker-end="url(#arrow)" d="M 856 446 L 856 540 L 520 540 L 520 583" />

  <!-- NODES -->
  <rect class="t" x="440" y="5" width="80" height="34" rx="17" />
  <text x="480" y="26" class="tx" font-weight="600">开始</text>

  <rect class="p" x="375" y="68" width="210" height="38" rx="4" />
  <text x="480" y="91" class="tx">显示系统主菜单</text>

  <rect class="p" x="380" y="143" width="200" height="38" rx="4" />
  <text x="480" y="166" class="tx">输入选择数字（1-8）</text>

  <polygon class="d" points="480,233 570,260 480,287 390,260" />
  <text x="480" y="256" class="tx" font-size="12">输入数字</text>
  <text x="480" y="271" class="tx" font-size="12">是否在1-8内？</text>

  <rect class="p" x="225" y="330" width="150" height="38" rx="4" />
  <text x="300" y="353" class="tx">提示输入错误</text>

  <!-- 功能框 -->
  <rect class="p" x="115" y="400" width="98" height="46" rx="4" />
  <text x="164" y="418" class="tx" font-size="11">邻接矩阵</text>
  <text x="164" y="433" class="tx" font-size="11">初始化</text>

  <rect class="p" x="219" y="400" width="94" height="46" rx="4" />
  <text x="266" y="418" class="tx" font-size="11">图数据</text>
  <text x="266" y="433" class="tx" font-size="11">检索输出</text>

  <rect class="p" x="322" y="400" width="90" height="46" rx="4" />
  <text x="367" y="425" class="tx" font-size="11">添加节点</text>

  <rect class="p" x="424" y="400" width="90" height="46" rx="4" />
  <text x="469" y="425" class="tx" font-size="11">添加图边</text>

  <rect class="p" x="526" y="400" width="90" height="46" rx="4" />
  <text x="571" y="425" class="tx" font-size="11">删除节点</text>

  <rect class="p" x="628" y="400" width="90" height="46" rx="4" />
  <text x="673" y="425" class="tx" font-size="11">删除路径</text>

  <rect class="p" x="730" y="400" width="90" height="46" rx="4" />
  <text x="775" y="418" class="tx" font-size="11">文件</text>
  <text x="775" y="433" class="tx" font-size="11">操作</text>

  <rect class="p" x="815" y="400" width="82" height="46" rx="4" />
  <text x="856" y="425" class="tx" font-size="11">退出系统</text>

  <rect class="t" x="440" y="585" width="80" height="34" rx="17" />
  <text x="480" y="606" class="tx" font-weight="600">结束</text>
</svg>