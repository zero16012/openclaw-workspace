<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校园导航系统 - 流程图</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#eee; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:"Microsoft YaHei","SimHei",sans-serif; padding:30px; }
  .c { background:#fff; position:relative; width:880px; height:560px; }
  .b { border:2px solid #000; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:bold; background:#fff; position:absolute; z-index:2; text-align:center; }
  .h { position:absolute; height:2px; background:#000; z-index:1; }
  .v { position:absolute; width:2px; background:#000; z-index:1; }
</style>
</head>
<body>
<div class="c">

  <!-- ===== 开始 ===== -->
  <div class="b" style="left:80px; top:250px; width:80px; height:40px;">开始</div>

  <!-- ===== 主菜单控制模块 ===== -->
  <div class="b" style="left:220px; top:225px; width:190px; height:90px; font-size:15px;">主菜单控制模块</div>

  <!-- ===== 右侧7个子模块 ===== -->
  <div class="b" style="left:540px; top:20px; width:200px; height:44px;">校园节点录入模块</div>
  <div class="b" style="left:540px; top:84px; width:200px; height:44px;">校园路径录入模块</div>
  <div class="b" style="left:540px; top:148px; width:200px; height:44px;">地图信息查询模块</div>
  <div class="b" style="left:540px; top:212px; width:200px; height:44px;">最短路径查询模块</div>
  <div class="b" style="left:540px; top:276px; width:200px; height:44px;">地图数据维护模块</div>
  <div class="b" style="left:540px; top:340px; width:200px; height:44px;">控制台图形化展示模块</div>
  <div class="b" style="left:540px; top:404px; width:200px; height:44px;">地图持久化模块</div>

  <!-- 右侧竖向主线 -->
  <div class="v" style="left:640px; top:20px; height:428px;"></div>

  <!-- 水平分割线 -->
  <div class="h" style="left:540px; top:64px; width:200px;"></div>
  <div class="h" style="left:540px; top:128px; width:200px;"></div>
  <div class="h" style="left:540px; top:192px; width:200px;"></div>
  <div class="h" style="left:540px; top:256px; width:200px;"></div>
  <div class="h" style="left:540px; top:320px; width:200px;"></div>
  <div class="h" style="left:540px; top:384px; width:200px;"></div>
  <div class="h" style="left:540px; top:448px; width:200px;"></div>

  <!-- 开始 → 主菜单 -->
  <div class="h" style="left:160px; top:270px; width:60px;"></div>

  <!-- 主菜单 → 右侧分支主干 -->
  <div class="h" style="left:410px; top:270px; width:130px;"></div>
  <div class="v" style="left:470px; top:42px; height:406px;"></div>

  <!-- 7条分支线 -->
  <div class="h" style="left:470px; top:42px; width:70px;"></div>
  <div class="h" style="left:470px; top:106px; width:70px;"></div>
  <div class="h" style="left:470px; top:170px; width:70px;"></div>
  <div class="h" style="left:470px; top:234px; width:70px;"></div>
  <div class="h" style="left:470px; top:298px; width:70px;"></div>
  <div class="h" style="left:470px; top:362px; width:70px;"></div>
  <div class="h" style="left:470px; top:426px; width:70px;"></div>

  <!-- 返回主菜单 -->
  <div class="h" style="left:470px; top:448px; width:170px;"></div>
  <div class="v" style="left:470px; top:448px; height:50px;"></div>
  <div class="h" style="left:220px; top:498px; width:250px;"></div>
  <div class="v" style="left:220px; top:315px; height:183px;"></div>

</div>
</body>
</html>
