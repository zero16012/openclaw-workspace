<svg viewBox="0 0 540 650" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000" />
    </marker>
  </defs>
  <style>
    .ed { stroke:#000000; stroke-width:1.5; fill:none; }
    .t { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .p { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .d { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .lb { fill:#000000; font-size:13px; font-weight:600; }
    .tx { fill:#000000; }
  </style>

  <!-- CONNECTORS (all right-angle turns) -->

  <!-- 1. 开始 → 打开文件 -->
  <path class="ed" marker-end="url(#arrow)" d="M 270 42 L 270 78" />

  <!-- 2. 打开文件 → 判断 -->
  <path class="ed" marker-end="url(#arrow)" d="M 270 120 L 270 173" />

  <!-- 3. 判断（失败）→ 提示失败 -->
  <path class="ed" marker-end="url(#arrow)" d="M 210 195 L 125 195 L 125 259" />
  <text class="lb" x="168" y="188">失败</text>

  <!-- 4. 提示失败 → 结束（左路下拐再右拐汇聚） -->
  <path class="ed" marker-end="url(#arrow)" d="M 125 299 L 125 560 L 270 560 L 270 591" />

  <!-- 5. 判断（成功）→ 写入 -->
  <path class="ed" marker-end="url(#arrow)" d="M 270 217 L 270 323" />
  <text class="lb" x="280" y="210">成功</text>

  <!-- 6. 写入 → 关闭 -->
  <path class="ed" marker-end="url(#arrow)" d="M 270 375 L 270 419" />

  <!-- 7. 关闭 → 提示成功 -->
  <path class="ed" marker-end="url(#arrow)" d="M 270 459 L 270 499" />

  <!-- 8. 提示成功 → 结束 -->
  <path class="ed" marker-end="url(#arrow)" d="M 270 539 L 270 591" />

  <!-- === NODES === -->

  <!-- 开始 -->
  <rect class="t" x="230" y="8" width="80" height="34" rx="17" />
  <text x="270" y="29" text-anchor="middle" font-size="14" font-weight="600" class="tx">开始</text>

  <!-- 以写方式打开campus_map.txt -->
  <rect class="p" x="160" y="80" width="220" height="40" rx="4" />
  <text x="270" y="104" text-anchor="middle" font-size="13" class="tx">以写方式打开campus_map.txt</text>

  <!-- 判断打开是否成功？ -->
  <polygon class="d" points="270,173 330,195 270,217 210,195" />
  <text x="270" y="191" text-anchor="middle" font-size="12" class="tx">判断打开</text>
  <text x="270" y="206" text-anchor="middle" font-size="12" class="tx">是否成功？</text>

  <!-- 提示地图保存失败 -->
  <rect class="p" x="50" y="261" width="150" height="38" rx="4" />
  <text x="125" y="284" text-anchor="middle" font-size="13" class="tx">提示地图保存失败</text>

  <!-- 写入节点总数、节点名称、邻接矩阵 -->
  <rect class="p" x="160" y="325" width="220" height="50" rx="4" />
  <text x="270" y="349" text-anchor="middle" font-size="13" class="tx">写入节点总数、节点名称</text>
  <text x="270" y="365" text-anchor="middle" font-size="13" class="tx">邻接矩阵</text>

  <!-- 关闭文件 -->
  <rect class="p" x="190" y="421" width="160" height="38" rx="4" />
  <text x="270" y="444" text-anchor="middle" font-size="13" class="tx">关闭文件</text>

  <!-- 提示地图保存成功 -->
  <rect class="p" x="185" y="501" width="170" height="38" rx="4" />
  <text x="270" y="524" text-anchor="middle" font-size="13" class="tx">提示地图保存成功</text>

  <!-- 结束 -->
  <rect class="t" x="230" y="593" width="80" height="34" rx="17" />
  <text x="270" y="614" text-anchor="middle" font-size="14" font-weight="600" class="tx">结束</text>
</svg>