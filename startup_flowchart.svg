<svg viewBox="0 0 540 680" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000" />
    </marker>
  </defs>
  <style>
    .ed { stroke:#000000; stroke-width:1.5; fill:none; }
    .t { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .p { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .d { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .lb { fill:#000000; font-size:13px; font-weight:600; }
    .tx { fill:#000000; }
  </style>

  <!-- CONNECTORS -->
  <path class="ed" marker-end="url(#arrow)" d="M 270 39 L 270 78" />
  <path class="ed" marker-end="url(#arrow)" d="M 270 120 L 270 158" />
  <path class="ed" marker-end="url(#arrow)" d="M 270 200 L 270 256" />

  <!-- 否 → 提示口令错误 -->
  <path class="ed" marker-end="url(#arrow)" d="M 200 280 L 130 280 L 130 351" />
  <text class="lb" x="165" y="273">否</text>

  <!-- 提示口令错误 → 结束 -->
  <path class="ed" marker-end="url(#arrow)" d="M 130 389 L 130 600 L 270 600 L 270 623" />

  <!-- 是 → 初始化 -->
  <path class="ed" marker-end="url(#arrow)" d="M 270 304 L 270 440" />
  <text class="lb" x="280" y="297">是</text>

  <!-- 初始化 → 主菜单 -->
  <path class="ed" marker-end="url(#arrow)" d="M 270 480 L 270 531" />

  <!-- 主菜单 → 结束 -->
  <path class="ed" marker-end="url(#arrow)" d="M 270 569 L 270 623" />

  <!-- NODES -->
  <rect class="t" x="230" y="5" width="80" height="34" rx="17" />
  <text x="270" y="26" text-anchor="middle" font-size="14" font-weight="600" class="tx">开始</text>

  <rect class="p" x="140" y="80" width="260" height="40" rx="4" />
  <text x="270" y="104" text-anchor="middle" font-size="12" class="tx">显示版权、设计者、班级、时间等信息</text>

  <rect class="p" x="175" y="160" width="190" height="40" rx="4" />
  <text x="270" y="184" text-anchor="middle" font-size="13" class="tx">输入系统启动口令</text>

  <polygon class="d" points="270,256 340,280 270,304 200,280" />
  <text x="270" y="276" text-anchor="middle" font-size="12" class="tx">口令是否等于1？</text>

  <rect class="p" x="60" y="351" width="140" height="38" rx="4" />
  <text x="130" y="374" text-anchor="middle" font-size="13" class="tx">提示口令错误</text>

  <rect class="p" x="165" y="440" width="210" height="40" rx="4" />
  <text x="270" y="464" text-anchor="middle" font-size="13" class="tx">初始化系统数据与邻接矩阵</text>

  <rect class="p" x="185" y="531" width="170" height="38" rx="4" />
  <text x="270" y="554" text-anchor="middle" font-size="13" class="tx">进入系统主菜单</text>

  <rect class="t" x="230" y="625" width="80" height="34" rx="17" />
  <text x="270" y="646" text-anchor="middle" font-size="14" font-weight="600" class="tx">结束</text>
</svg>