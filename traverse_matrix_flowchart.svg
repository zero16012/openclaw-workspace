<svg viewBox="0 0 640 780" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000" />
    </marker>
  </defs>
  <style>
    .ed { stroke:#000000; stroke-width:1.5; fill:none; }
    .t { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .p { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .d { fill:#ffffff; stroke:#000000; stroke-width:1.5; }
    .lb { fill:#000000; font-size:13px; font-weight:600; }
    .tx { fill:#000000; }
  </style>

  <!-- MAIN FLOW -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 39 L 320 69" />
  <path class="ed" marker-end="url(#arrow)" d="M 320 110 L 320 148" />
  <path class="ed" marker-end="url(#arrow)" d="M 320 190 L 320 264" />

  <!-- 判断(是) → 输出 -->
  <path class="ed" marker-end="url(#arrow)" d="M 400 288 L 490 288 L 490 348" />
  <text class="lb" x="445" y="281">是</text>

  <!-- 否 → 回内层(左路) -->
  <path class="ed" marker-end="url(#arrow)" d="M 240 288 L 150 288 L 150 160 L 215 160" />
  <text class="lb" x="195" y="281">否</text>

  <!-- 输出完成 → 回内层(右路) -->
  <path class="ed" marker-end="url(#arrow)" d="M 490 388 L 490 160 L 425 160" />

  <!-- 内层循环结束(左出) → 换行输出 -->
  <path class="ed" marker-end="url(#arrow)" d="M 215 178 L 120 178 L 120 480 L 235 480" />
  <text class="lb" x="125" y="330">内层循环结束</text>

  <!-- 换行输出 → 全部遍历完毕 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 520 L 320 576" />

  <!-- 未完成 → 返回外层循环 -->
  <path class="ed" marker-end="url(#arrow)" d="M 250 600 L 130 600 L 130 82 L 215 82" />
  <text class="lb" x="190" y="593">未完成</text>

  <!-- 完成 → 结束 -->
  <path class="ed" marker-end="url(#arrow)" d="M 320 624 L 320 698" />
  <text class="lb" x="330" y="617">完成</text>

  <!-- NODES -->
  <rect class="t" x="280" y="5" width="80" height="34" rx="17" />
  <text x="320" y="26" text-anchor="middle" font-size="14" font-weight="600" class="tx">开始</text>

  <rect class="p" x="215" y="70" width="210" height="40" rx="4" />
  <text x="320" y="94" text-anchor="middle" font-size="13" class="tx">外层循环遍历每个节点i</text>

  <rect class="p" x="215" y="150" width="210" height="40" rx="4" />
  <text x="320" y="174" text-anchor="middle" font-size="13" class="tx">内层循环遍历每个节点j</text>

  <polygon class="d" points="320,264 400,288 320,312 240,288" />
  <text x="320" y="284" text-anchor="middle" font-size="12" class="tx">判断graph[i][j]</text>
  <text x="320" y="299" text-anchor="middle" font-size="12" class="tx">是否为有效路径？</text>

  <rect class="p" x="395" y="350" width="190" height="38" rx="4" />
  <text x="490" y="373" text-anchor="middle" font-size="12" class="tx">输出连通关系与路径长度</text>

  <rect class="p" x="235" y="480" width="170" height="40" rx="4" />
  <text x="320" y="504" text-anchor="middle" font-size="13" class="tx">换行输出</text>

  <polygon class="d" points="320,576 390,600 320,624 250,600" />
  <text x="320" y="596" text-anchor="middle" font-size="12" class="tx">判断全部节点</text>
  <text x="320" y="611" text-anchor="middle" font-size="12" class="tx">是否遍历完毕？</text>

  <rect class="t" x="280" y="700" width="80" height="34" rx="17" />
  <text x="320" y="721" text-anchor="middle" font-size="14" font-weight="600" class="tx">结束</text>
</svg>